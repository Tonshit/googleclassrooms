<!DOCTYPE html>
<html>
<head>
<title>Security Demo Dashboard</title>
<link rel="icon" href="logo.png">
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Courier New', monospace;
}

body{
  background:#0c111b;
  color:#a3fca8;
  overflow-x:hidden;
  position:relative;
}

/* Binary background */
#binaryCanvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
  background:#0c111b;
}

/* Dashboard overlay */
.dashboard{
  position:relative;
  z-index:1;
  padding:20px 40px 40px 40px;
}

/* Navbar */
.navbar{
  background:rgba(0,0,0,0.85);
  padding:18px 30px;
  font-size:24px;
  font-weight:bold;
  color:#a3fca8;
  text-shadow:0 0 5px #4caf50;
  border-bottom:1px solid #1e293b;
}

/* Live feed console */
.console{
  background:rgba(12,17,27,0.9);
  border:1px solid #4caf50;
  border-radius:6px;
  padding:10px 15px;
  height:120px;
  overflow:hidden;
  margin:15px 0;
  box-shadow:0 0 10px #4caf50 inset;
}

.console p{
  font-size:14px;
  line-height:1.2;
  color:#a3fca8;
  margin:0;
  white-space:nowrap;
}

/* Card styles */
.card{
  background:rgba(12,17,27,0.85);
  border:1px solid #4caf50;
  border-radius:10px;
  padding:20px;
  box-shadow:0 0 10px #4caf50 inset, 0 0 15px #4caf50;
  backdrop-filter:blur(4px);
  transition:0.3s;
  margin-bottom:20px;
}

.card:hover{
  box-shadow:0 0 15px #4caf50 inset, 0 0 20px #4caf50;
}

/* Header and search */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
  flex-wrap:wrap;
  gap:10px;
}

.search{
  padding:6px 10px;
  border:none;
  border-radius:5px;
  background:#16212e;
  color:white;
  outline:none;
  box-shadow:0 0 5px #4caf50;
}

.clear-btn{
  padding:6px 10px;
  background:#ef4444;
  border:none;
  border-radius:5px;
  color:white;
  cursor:pointer;
  box-shadow:0 0 5px #ef4444;
  transition:0.2s;
}

.clear-btn:hover{
  box-shadow:0 0 10px #ef4444;
}

/* Stats */
.stats{
  display:flex;
  gap:20px;
  margin-bottom:15px;
}

.stat{
  background:#16212e;
  padding:10px 15px;
  border-radius:6px;
  box-shadow:0 0 5px #4caf50;
}

.stat span{
  display:block;
  font-size:20px;
  font-weight:bold;
}

/* Table */
table{
  width:100%;
  border-collapse:collapse;
  color:#a3fca8;
}

th{
  background:#16212e;
  padding:10px;
  text-align:left;
  border-bottom:1px solid #4caf50;
}

td{
  padding:10px;
  border-bottom:1px solid #16212e;
  font-size:13px;
  transition:0.3s;
}

tr.online{
  background:rgba(76,175,80,0.1);
  transition:0.5s;
}

tr.offline{
  background:rgba(244,67,54,0.08);
  transition:0.5s;
}

/* Password */
.password{
  font-family:monospace;
}

/* Buttons */
.delete, .show{
  padding:5px 10px;
  border:none;
  border-radius:4px;
  color:white;
  cursor:pointer;
  box-shadow:0 0 5px rgba(0,0,0,0.3);
  transition:0.2s;
}

.show{background:#3b82f6;margin-right:5px;}
.show:hover{box-shadow:0 0 10px #3b82f6;}
.delete{background:#ef4444;}
.delete:hover{box-shadow:0 0 10px #ef4444;}

/* Status dots */
.status-dot{
  display:inline-block;
  width:12px;
  height:12px;
  border-radius:50%;
  margin-right:5px;
  animation: pulse 1.5s infinite;
}

.online-dot{background:#4caf50;}
.offline-dot{background:#f44336;}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.3);}
  100%{transform:scale(1);}
}
</style>
</head>
<body>

<canvas id="binaryCanvas"></canvas>

<div class="dashboard">

<div class="navbar">
💻 Security Demo Dashboard
</div>

<!-- Add Login Card -->
<div class="card">
  <h2>Simulate New Login</h2>
  <input type="text" id="emailInput" placeholder="Email" class="search">
  <input type="password" id="passInput" placeholder="Password" class="search">
  <button class="show" onclick="addLogin()">Enter</button>
</div>

<!-- Live feed -->
<div class="console" id="liveFeed"></div>

<!-- Captured Logins Card -->
<div class="card">
<div class="header">
<h2>Captured Login Attempts</h2>
<input class="search" id="searchBox" placeholder="Search email..." onkeyup="displayData()">
<button class="clear-btn" onclick="clearLogs()">Clear All</button>
</div>

<div class="stats">
<div class="stat">
Total Attempts
<span id="totalAttempts">0</span>
</div>
</div>

<table>
<tr>
<th>Email</th>
<th>Password</th>
<th>IP Address</th>
<th>Status</th>
<th>Time</th>
<th>Action</th>
</tr>
<tbody id="tableData"></tbody>
</table>
</div>

</div>

<script>
// Binary background
const canvas = document.getElementById('binaryCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const binaryChars = "01";
const fontSize = 12;
const columns = Math.floor(canvas.width / fontSize);
const drops = Array(columns).fill(1);

function drawBinary(){
  ctx.fillStyle = 'rgba(12,17,27,0.05)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#4caf50';
  ctx.font = fontSize + "px monospace";
  for(let i=0;i<drops.length;i++){
    const text = binaryChars.charAt(Math.floor(Math.random()*binaryChars.length));
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);
    if(drops[i]*fontSize > canvas.height || Math.random()>0.99) drops[i]=0;
    drops[i]++;
  }
  requestAnimationFrame(drawBinary);
}
drawBinary();
window.addEventListener('resize', ()=>{ canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

// Security demo log
let attempts = JSON.parse(localStorage.getItem("demoAttempts")) || [];

let table = document.getElementById("tableData");
let liveFeed = document.getElementById("liveFeed");

function displayData(){
  let search = document.getElementById("searchBox").value.toLowerCase();
  table.innerHTML="";
  attempts.forEach((a,index)=>{
    if(a.email.toLowerCase().includes(search)){
      table.innerHTML += `
<tr id="row${index}" class="${a.status}">
<td>${a.email}</td>
<td class="password" id="pass${index}">••••••</td>
<td>${a.ip}</td>
<td id="status${index}">
<span class="status-dot ${a.status==='online'?'online-dot':'offline-dot'}"></span>${a.status==="online" ? "Online":"Offline"}
</td>
<td>${a.time}</td>
<td>
<button class="show" onclick="togglePass(${index},'${a.password}')">Show</button>
<button class="delete" onclick="deleteRow(${index})">Delete</button>
</td>
</tr>`;
    }
  });
  document.getElementById("totalAttempts").innerText = attempts.length;
}

// Toggle password
function togglePass(index,password){
  let cell=document.getElementById("pass"+index);
  cell.innerText = cell.innerText==="••••••" ? password : "••••••";
}

// Delete row
function deleteRow(index){
  attempts.splice(index,1);
  localStorage.setItem("demoAttempts",JSON.stringify(attempts));
  displayData();
}

// Clear logs
function clearLogs(){
  if(confirm("Clear all captured logs?")){
    localStorage.removeItem("demoAttempts");
    attempts=[];
    displayData();
  }
}

// Add new login
function addLogin(){
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passInput').value.trim();
  if(!email || !password){
    alert("Enter both email and password!");
    return;
  }
  const now = new Date();
  const timeStr = now.getFullYear()+"-"+(now.getMonth()+1).toString().padStart(2,"0")+
                  "-"+now.getDate().toString().padStart(2,"0")+" "+
                  now.getHours().toString().padStart(2,"0")+":"+
                  now.getMinutes().toString().padStart(2,"0");
  
  const newAttempt = {
    email: email,
    password: password,
    ip: "192.168.1."+Math.floor(Math.random()*255),
    status: "offline",
    time: timeStr
  };
  
  attempts.push(newAttempt);
  localStorage.setItem("demoAttempts", JSON.stringify(attempts));
  displayData();
  
  // Clear inputs
  document.getElementById('emailInput').value="";
  document.getElementById('passInput').value="";
}

// Real-time status update & row highlight
function updateStatus(){
  attempts.forEach((a,index)=>{
    const oldStatus = a.status;
    a.status = Math.random()>0.5 ? "online" : "offline";
    let statusCell = document.getElementById("status"+index);
    let row = document.getElementById("row"+index);
    if(statusCell && row){
      statusCell.innerHTML = `<span class="status-dot ${a.status==='online'?'online-dot':'offline-dot'}"></span>${a.status==="online" ? "Online":"Offline"}`;
      row.className = a.status;
      if(oldStatus !== a.status){
        liveFeed.innerHTML = `<p>[${a.time}] ${a.email} is now ${a.status}</p>` + liveFeed.innerHTML;
        if(liveFeed.childElementCount>10) liveFeed.removeChild(liveFeed.lastChild);
      }
    }
  });
}
setInterval(updateStatus,3000);

// Listen for updates from other tabs
window.addEventListener('storage', function(e){
  if(e.key === "demoAttempts"){
    attempts = JSON.parse(localStorage.getItem("demoAttempts")) || [];
    displayData();
  }
});

displayData();
</script>
</body>
</html>
